# Sky1 Kernel Config Policy
#
# Options that must have the same value across all track configs
# (config.sky1, config.sky1-latest, config.sky1-rc, config.sky1-next).
#
# Format: OPTION=value (without CONFIG_ prefix)
# Lines starting with # are comments. Blank lines ignored.
# Sections are for readability only — all options are checked equally.
#
# Only include options common to ALL Sky1 boards here.
# Board-specific drivers (e.g. R8126 for O6, R8125 for O6N) do not belong.
#
# Used by: ~/mainline-linux/scripts/reconcile-configs.py

[platform]
ARCH_CIX=y
PCI_SKY1=y
PCIE_CADENCE_HOST=y
PINCTRL_SKY1_BASE=y
PINCTRL_SKY1=y
RESET_SKY1=y
RESET_SKY1_AUDSS=y
CIX_MBOX=y
CLK_SKY1_AUDSS=y
CLK_SKY1_ACPI=y
CIX_ACPI_RESOURCE_LOOKUP=y
HWSPINLOCK_SKY1=y
NVMEM_SKY1=y
CIX_SKY1_SOCINFO=y
SKY1_PDC=y
CIX_BUS_PERF=y
CIX_CPU_IPA=y
CIX_DDR_LP=y
GPIO_CADENCE=y
PWM_SKY1=y
SKY1_WATCHDOG=y
SKY1_GPT_TIMER=m
SENSORS_CIX_FAN=m

[display]
DRM_CIX=m
DRM_LINLONDP=m
DRM_TRILIN_DPSUB=m
DRM_TRILIN_DP_CIX=m
DRM_CIX_VIRTUAL=m
DRM_CIX_EDP_PANEL=m
DRM_PANTHOR=m

[audio]
SND_HDA_CIX_IPBLOQ=m
SND_SOC_CIX=m
SND_SOC_SKY1_SOUND_CARD=m
SND_SOC_CDNS_I2S_MC=m
SND_SOC_CDNS_I2S_SC=m
SND_SOC_SOF_CIX_TOPLEVEL=y
SND_SOC_SOF_CIX_COMMON=m
SND_SOC_SOF_CIX_SKY1=m

[usb]
USB_CDNS_SUPPORT=y
USB_CDNS3=y
USB_CDNSP=y
USB_CDNSP_SKY1=y
CIX_ACPI_USB_SCAN=y
TYPEC=y
USB_UAS=m
PHY_CIX_USB2=y
PHY_CIX_USB3=y
PHY_CIX_USBDP=y

[storage]
BLK_DEV_NVME=y
PHY_CIX_PCIE=y

[video]
VIDEO_LINLON=m
VIDEO_LINLON_PRINT_FILE=y

[npu]
ARMCHINA_NPU=m
ARMCHINA_NPU_ARCH_V3=y
ARMCHINA_NPU_SOC_SKY1=y

[dsp]
CIX_DSP=m
CIX_DSP_RPROC=m
DMABUF_HEAPS_DSP=m

[network]
NETFILTER=y
NF_TABLES=m
IPV6=m
