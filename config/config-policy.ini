# Sky1 Kernel Config Policy
#
# Options that must have the same value across all track configs
# (config.sky1, config.sky1-latest, config.sky1-rc, config.sky1-next).
#
# Format: OPTION=value (without CONFIG_ prefix)
# Lines starting with # are comments. Blank lines ignored.
# Sections are for readability only — all options are checked equally.
#
# Only include options common to ALL Sky1 boards here.
# Board-specific drivers (e.g. R8126 for O6, R8125 for O6N) do not belong.
#
# Used by: ~/mainline-linux/scripts/reconcile-configs.py

[platform]
ARCH_CIX=y
PCI_SKY1=y
PCIE_CADENCE_HOST=y
PINCTRL_SKY1_BASE=y
PINCTRL_SKY1=y
RESET_SKY1=y
RESET_SKY1_AUDSS=y
CIX_MBOX=y
CLK_SKY1_AUDSS=y
CLK_SKY1_ACPI=y
CIX_ACPI_RESOURCE_LOOKUP=y
HWSPINLOCK_SKY1=y
NVMEM_SKY1=y
CIX_SKY1_SOCINFO=y
SKY1_PDC=y
CIX_BUS_PERF=y
CIX_CPU_IPA=y
CIX_DDR_LP=y
GPIO_CADENCE=y
PWM_SKY1=y
SKY1_WATCHDOG=y
SKY1_GPT_TIMER=m
SENSORS_CIX_FAN=m

[display]
